<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FC Control — Controle Financeiro</title>
<link rel="icon" href="favicon.png" />
<!-- Firebase (compat — simples de usar em HTML estático) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<!-- SheetJS — importar planilha Excel direto no navegador -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Chart.js — gráficos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<!-- Tipografia Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2f8a2c; --green-d:#246e22; --green-l:#3a9a34;
    --gold:#e8a90c; --gold-l:#f7d04a;
    --red:#d62828; --red-d:#b81f1f;
    --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --bg:#f6f7f5; --card:#ffffff;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  a{color:inherit;text-decoration:none}
  .app{display:flex;min-height:100vh}

  /* Barra lateral */
  .side{width:230px;background:linear-gradient(180deg,#1c3a1b,#143013);color:#e9efe9;display:flex;flex-direction:column;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;padding:16px 16px 12px}
  .brand img{width:38px;height:38px}
  .brand b{font-size:16px;font-weight:800;letter-spacing:.3px}
  .brand b span{color:var(--gold-l)}
  .nav{padding:8px;display:flex;flex-direction:column;gap:2px}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#cfe0cd;font-weight:600;cursor:pointer}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:var(--gold);color:#3a2b00}
  .nav .ico{width:18px;text-align:center}
  .side .foot{margin-top:auto;padding:12px 16px;font-size:11px;color:#9fb89d}

  /* Conteúdo */
  .main{flex:1;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .topbar h1{margin:0;font-size:18px}
  .topbar .sub{color:var(--muted);font-size:12px}
  .content{padding:22px;max-width:1100px}

  /* Componentes */
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:820px){.g2,.g3,.g4{grid-template-columns:1fr}.side{width:64px}.brand b,.nav a span.lbl,.side .foot{display:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .card .hd{padding:14px 18px;border-bottom:1px solid var(--line)}
  .card .hd h3{margin:0;font-size:15px}
  .card .hd p{margin:2px 0 0;color:var(--muted);font-size:12px}
  .card .bd{padding:18px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .stat .lbl{color:var(--muted);font-size:12px;font-weight:600}
  .stat .val{font-size:24px;font-weight:800;margin-top:4px}
  .stat .hint{color:var(--muted);font-size:11px;margin-top:4px}
  .pos{color:var(--green)} .neg{color:var(--red)} .gold{color:var(--gold)}

  label.f{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
  input,select{width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:9px;font-size:14px;background:#fff;outline:none}
  input:focus,select:focus{border-color:var(--green-l);box-shadow:0 0 0 3px rgba(58,154,52,.15)}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .row > div{flex:1;min-width:120px}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border:none;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;background:var(--green);color:#fff}
  .btn:hover{background:var(--green-d)}
  .btn.gold{background:var(--gold);color:#3a2b00}.btn.gold:hover{background:#cf960a}
  .btn.red{background:var(--red);color:#fff}.btn.red:hover{background:var(--red-d)}
  .btn.ghost{background:#fff;border:1px solid #d1d5db;color:#374151}.btn.ghost:hover{background:#f3f4f6}
  .btn.sm{padding:6px 11px;font-size:12px}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 10px;font-size:13px;border-bottom:1px solid #f0f0ef}
  th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.r,th.r{text-align:right}
  tr:hover td{background:#fafbfa}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .b-green{background:#e3f4e1;color:var(--green-d)} .b-red{background:#fde3e3;color:var(--red-d)}
  .b-gold{background:#fcefcc;color:#8a6a00} .b-gray{background:#eef0ee;color:#555}
  .muted{color:var(--muted)} .small{font-size:12px}
  .empty{color:#9aa39a;font-size:13px;padding:10px 0}
  .pend{border:1px solid #f0d488;background:#fffbef;border-radius:12px;padding:12px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .toast{position:fixed;right:18px;bottom:18px;background:#143013;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.25);font-weight:600;z-index:50;opacity:0;transform:translateY(8px);transition:.25s}
  .toast.show{opacity:1;transform:none}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .tabs button{padding:8px 14px;border:1px solid var(--line);background:#fff;border-radius:999px;font-weight:600;cursor:pointer;font-size:13px}
  .tabs button.active{background:var(--green);color:#fff;border-color:var(--green)}
  .hr{height:1px;background:var(--line);margin:14px 0}
  .pill{font-size:11px;background:#eef0ee;border-radius:999px;padding:2px 8px;color:#555}
  .resumo{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 18px;margin-bottom:6px}
  @media(max-width:680px){.resumo{grid-template-columns:1fr}}
  .rz{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 0;border-bottom:1px dashed #eee;font-size:13px}
  .rz span:first-child{color:var(--muted)}
  .precoEdit{width:110px;text-align:right;padding:5px 8px}
  .warn{background:#fff7e6;border:1px solid #f3d99b;color:#7a5a00;padding:10px 12px;border-radius:10px;font-size:13px}
  .ok{background:#e9f7e7;border:1px solid #b6e0b0;color:#246e22;padding:10px 12px;border-radius:10px;font-size:13px}
  .err{background:#fdeaea;border:1px solid #f3b8b8;color:#9b1c1c;padding:10px 12px;border-radius:10px;font-size:13px}

  /* ---- v2: visual mais profissional ---- */
  body{background:#eef1ee}
  .content{max-width:1180px}
  .topbar{box-shadow:0 1px 0 rgba(0,0,0,.04)}
  .card{border-radius:16px;border-color:#e9ece9}
  .stat{border-radius:16px;position:relative;overflow:hidden;border-color:#e9ece9}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
  .stat.neg::before{background:var(--red)} .stat.gold::before{background:var(--gold)} .stat.blue::before{background:#2563eb}
  .stat .val{font-size:26px;letter-spacing:-.5px}
  /* Cartões de empresa (Dashboard) */
  .empresas{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .empresa{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid #e3e6e3;background:#fff;border-radius:14px;cursor:pointer;box-shadow:var(--shadow);transition:.15s;min-width:190px}
  .empresa:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
  .empresa.ativa{border-color:var(--green);box-shadow:0 0 0 2px rgba(47,138,44,.18)}
  .empresa img,.empresa .ph{width:44px;height:44px;border-radius:11px;object-fit:cover;background:#f0f2f0;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--green-d)}
  .empresa .en{font-weight:700} .empresa .es{font-size:11px;color:var(--muted)}
  /* Gráficos */
  .chart-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
  @media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
  .chart-box{position:relative;height:280px}
  .chart-box.sm{height:240px}
  /* Logo do painel na barra lateral */
  .brand img{object-fit:contain}
  .secao-titulo{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:18px 2px 8px}
  input[type=file]{font-size:13px}
  .logo-prev{width:54px;height:54px;border-radius:12px;object-fit:cover;border:1px solid var(--line);background:#fff;vertical-align:middle}

  /* ============ v3: redesign premium (Proposta FC) ============ */
  body{font-family:'Inter',"Segoe UI",Roboto,Arial,sans-serif;background:#eef1ee;color:#1f2937}
  .side{width:248px;background:linear-gradient(180deg,#16321400,#0f240e),#14321b;background:#143019}
  .brand{padding:18px 18px 14px}
  .brand b{font-size:17px}
  .nav{padding:6px 8px;gap:1px}
  .nav .grp{font-size:10px;font-weight:700;letter-spacing:1.2px;color:#83a880;text-transform:uppercase;padding:14px 12px 5px}
  .nav a{border-radius:0 10px 10px 0;padding:9px 12px;color:#cfe0cd;font-weight:500;border-left:3px solid transparent}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:rgba(255,255,255,.10);color:#fff;border-left:3px solid var(--gold);font-weight:600}
  .nav a.active .ico{filter:none}
  .side .foot{font-size:11px;color:#9fb89d}
  .plano{margin-top:auto;padding:12px}
  .plano-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:12px}
  .plano-t{font-weight:700;font-size:13px;color:#fff}
  .plano-s{font-size:11px;color:#9fb89d;margin:2px 0 8px}
  .plano-btn{width:100%;background:var(--gold);color:#3a2b00;border:none;border-radius:8px;padding:8px;font-weight:700;font-size:12px;cursor:pointer}
  .plano-btn:hover{background:#cf960a}
  @media(max-width:820px){.side{width:64px}.nav .grp{text-align:center;font-size:8px}.plano-card{display:none}}

  /* Topbar executivo */
  .topbar{padding:14px 26px}
  .topbar h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
  .tbctrls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .tbfld{display:flex;flex-direction:column;gap:2px}
  .tbfld label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .tbfld select,.tbfld input{padding:7px 10px;border-radius:9px;font-size:13px;font-weight:600;min-width:120px}
  .btn.cta{background:var(--green-d);color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(20,48,25,.25)}
  .btn.cta:hover{background:#1d5a1c}

  /* KPI premium */
  .kpi{display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid #e9ece9;border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .kpi .ic.g{background:#e3f4e1;color:var(--green-d)} .kpi .ic.r{background:#fde3e3;color:var(--red-d)}
  .kpi .ic.y{background:#fcefcc;color:#8a6a00} .kpi .ic.b{background:#e3ecff;color:#2563eb}
  .kpi .kl{font-size:12px;color:var(--muted);font-weight:600}
  .kpi .kv{font-size:29px;font-weight:800;letter-spacing:-1px;margin:2px 0;line-height:1.1}
  .kpi .kh{font-size:11px;color:var(--muted)}
  .trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-top:6px}
  .trend.up{background:#e3f4e1;color:var(--green-d)} .trend.down{background:#fde3e3;color:var(--red-d)} .trend.flat{background:#eef0ee;color:#667}

  /* Legenda de gráfico (categorias) */
  .legend{display:flex;flex-direction:column;gap:8px}
  .legend .li{display:flex;align-items:center;gap:8px;font-size:13px}
  .legend .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .legend .ln{flex:1;color:#374151} .legend .lv{font-weight:700} .legend .lp{color:var(--muted);width:48px;text-align:right}
  .cat-grid{display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:center}
  @media(max-width:680px){.cat-grid{grid-template-columns:1fr}}

  /* Alertas acionáveis */
  .alert{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 14px;border-radius:12px;margin-bottom:8px;border:1px solid}
  .alert .at{font-weight:700;font-size:13px} .alert .ad{font-size:12px;color:#555;margin-top:1px}
  .alert.amber{background:#fff8ec;border-color:#f1d695} .alert.red{background:#fdeeee;border-color:#f0b4b4} .alert.green{background:#eef8ec;border-color:#bfe3b6}
  .tagcat{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:#eef0ee;color:#475569}
  .diabadge{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:42px;height:42px;border:1px solid var(--line);border-radius:10px;line-height:1}
  .diabadge b{font-size:15px;color:#1f2937} .diabadge span{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-top:2px}
  .linkmais{color:var(--green-d);font-weight:700;cursor:pointer;text-decoration:none;font-size:13px}
  .linkmais:hover{text-decoration:underline}
  /* Login */
  #login{position:fixed;inset:0;background:linear-gradient(135deg,#143019,#0f240e);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .login-card{background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:32px;width:100%;max-width:380px;text-align:center}
  .login-card img{width:72px;height:72px;object-fit:contain;margin-bottom:8px}
  .login-card h2{margin:0 0 2px;font-size:20px} .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .login-card label{display:block;text-align:left;font-size:12px;font-weight:600;color:#374151;margin:10px 0 4px}
  .login-card .btn{width:100%;justify-content:center;margin-top:18px;padding:11px}
  .login-err{color:var(--red-d);font-size:13px;margin-top:10px;min-height:18px}
  .sair{display:block;margin-top:8px;color:#cfe0cd;font-size:12px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <img src="logo.svg" alt="FC Control" onerror="this.src='logo.png'"/>
    <h2>FC Control</h2>
    <div class="sub">Entre para acessar o painel</div>
    <label>E-mail</label>
    <input id="login_email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')fazerLogin()">
    <label>Senha</label>
    <input id="login_senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-err" id="login_err"></div>
  </div>
</div>
<div class="app">
  <aside class="side">
    <div class="brand">
      <img id="brandLogo" src="logo.svg" alt="FC Control" onerror="this.src='logo.png'"/>
      <b>FC <span>CONTROL</span></b>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="plano">
      <div class="plano-card">
        <div class="plano-t">👑 Plano Profissional</div>
        <div class="plano-s">Seu plano está ativo.</div>
        <button class="plano-btn" onclick="irPara('config')">Ver benefícios →</button>
      </div>
      <div class="foot" style="margin-top:8px"><span id="usuarioAtual"></span> · <span id="modoDados">modo local</span><span class="sair" onclick="logout()">Sair</span></div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="pgTitulo">Dashboard</h1>
        <div class="sub" id="pgSub"></div>
      </div>
      <div id="topRight"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================================
   FC CONTROL — app de controle financeiro (HTML estático + Firebase)
   ----------------------------------------------------------------------------
   - Persistência: Firebase Realtime DB se configurado (ver aba Configuração),
     senão cai em localStorage (modo local) para você já ver funcionando.
   - Precificação portada do sistema Audens (CMV, markup, preço cardápio/iFood).
   - Importação da planilha "Delivery Lucrativo" roda no navegador (SheetJS).
   - As saídas via WhatsApp são gravadas pela FUNÇÃO do comprovante em
     /caixa/saidas com status "pendente"; aqui você confirma ou descarta.
   ========================================================================== */

/* ---------- Configuração do Firebase (cole a sua na aba Configuração) -------
   Você pode também colar direto aqui em firebaseConfig para já subir pronto. */
let firebaseConfig = JSON.parse(localStorage.getItem("fc_firebase_cfg") || "null") || {
  apiKey: "AIzaSyAuJ8jYwaHMmEGRK79NPW0CNSyHIyTQyjQ",
  authDomain: "fc-control-87c59.firebaseapp.com",
  databaseURL: "https://fc-control-87c59-default-rtdb.firebaseio.com",
  projectId: "fc-control-87c59",
  storageBucket: "fc-control-87c59.firebasestorage.app",
  messagingSenderId: "51794280066",
  appId: "1:51794280066:web:4a19066678cc57ca3bfe9b",
  measurementId: "G-11GM9CXLES"
};

/* ---------------------- Camada de dados (DB) -------------------------------
   API mínima: DB.list(path,cb), DB.push(path,obj), DB.update(path,obj),
   DB.remove(path), DB.set(path,obj). Usa Firebase ou localStorage. */
const DB = (function(){
  let useFb = false, db = null;
  const localKey = "fc_data";
  let local = JSON.parse(localStorage.getItem(localKey) || "{}");
  const subs = {}; // path -> [cb]

  function saveLocal(){ localStorage.setItem(localKey, JSON.stringify(local)); }
  function node(path){ return path.split("/").filter(Boolean); }
  function getLocal(path){ let o=local; for(const k of node(path)){ o=o&&o[k]; } return o; }
  function setLocal(path,val){ let o=local; const ks=node(path); for(let i=0;i<ks.length-1;i++){ o[ks[i]]=o[ks[i]]||{}; o=o[ks[i]]; } o[ks[ks.length-1]]=val; saveLocal(); }
  function delLocal(path){ let o=local; const ks=node(path); for(let i=0;i<ks.length-1;i++){ o=o&&o[ks[i]]; if(!o)return; } delete o[ks[ks.length-1]]; saveLocal(); }
  function emit(path){ const obj=getLocal(path)||{}; (subs[path]||[]).forEach(cb=>cb(obj)); }
  function uid(){ return "id"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function init(){
    if(firebaseConfig && firebaseConfig.apiKey){
      try{
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database(); useFb = true;
        document.getElementById("modoDados").textContent = "Firebase conectado";
      }catch(e){ console.warn("Firebase falhou, usando modo local:",e.message); useFb=false; }
    }
    if(!useFb) document.getElementById("modoDados").textContent = "modo local (sem Firebase)";
  }

  return {
    get useFb(){ return useFb; },
    init,
    list(path, cb){
      if(useFb){ db.ref(path).on("value", s=>cb(s.val()||{})); }
      else { (subs[path]=subs[path]||[]).push(cb); cb(getLocal(path)||{}); }
    },
    push(path, obj){
      if(useFb){ const ref=db.ref(path).push(); ref.set(obj); return ref.key; }
      const id=uid(); setLocal(path+"/"+id, obj); emit(path); return id;
    },
    set(path, obj){ if(useFb){ db.ref(path).set(obj); } else { setLocal(path,obj); emit(path); emit(path.split("/").slice(0,-1).join("/")); } },
    update(path, obj){
      if(useFb){ db.ref(path).update(obj); }
      else { const cur=getLocal(path)||{}; setLocal(path, Object.assign({},cur,obj)); emit(path); emit(path.split("/").slice(0,-1).join("/")); }
    },
    remove(path){ if(useFb){ db.ref(path).remove(); } else { delLocal(path); emit(path.split("/").slice(0,-1).join("/")); } }
  };
})();

/* ===================== PRECIFICAÇÃO (portado do Audens) ===================== */
function custoUnitario(insumo){ const q=num(insumo.quantidadeCompra); return q? num(insumo.valorCompra)/q : 0; }
function insumoPorNome(nome){ const n=norm(nome); return obj2arr(STATE.insumos).find(i=>norm(i.nome)===n)||null; }
function cmvProduto(prod){
  // Com ficha técnica: soma custo unitário × quantidade. Sem ficha (produto importado da
  // RELAÇÃO DE PRODUTOS ou cadastrado direto): usa o CMV salvo em cmvManual.
  if(prod.ficha && prod.ficha.length){
    return prod.ficha.reduce((t,it)=>{
      const ins = it.insumoNome? insumoPorNome(it.insumoNome) : (it.insumoId? Object.assign({_id:it.insumoId},STATE.insumos[it.insumoId]) : null);
      const cu = ins? custoUnitario(ins) : num(it.valorUnit);
      return t + cu*num(it.quantidade);
    },0);
  }
  return num(prod.cmvManual);
}
/* % de custo fixo/variável CALCULADOS sobre o faturamento (igual planilha). Imposto entra no variável. */
function parametrosResolvidos(){
  const p = STATE.parametros||{};
  const fat = num(p.faturamentoMedio);
  const custos = obj2arr(STATE.custos);
  const somaFixo = custos.filter(c=>c.tipo==="FIXO").reduce((s,c)=>s+num(c.valor),0);
  const somaVar  = custos.filter(c=>c.tipo==="VARIAVEL").reduce((s,c)=>s+num(c.valor),0);
  const pcfManual = p.percentualCustoFixo, pcvManual = p.percentualCustoVariavel;
  const percentualCustoFixo = (pcfManual!=null && pcfManual!=="")? num(pcfManual) : (fat? somaFixo/fat*100 : 0);
  const percentualCustoVariavel = (pcvManual!=null && pcvManual!=="")? num(pcvManual) : ((fat? somaVar/fat*100 : 0) + num(p.taxaImposto));
  return { percentualCustoFixo, percentualCustoVariavel, lucroDesejado:num(p.lucroDesejado), taxaIfood:num(p.taxaIfood) };
}
function calcularMarkup(p, incluirIfood){
  const soma = p.percentualCustoFixo + p.percentualCustoVariavel + p.lucroDesejado + (incluirIfood? p.taxaIfood:0);
  const den = 100 - soma; return den<=0? null : 100/den;
}
function precoBaseIfood(precoCardapio, taxaIfood){
  if(precoCardapio==null) return null; const f=1-num(taxaIfood)/100; return f<=0?null:precoCardapio/f;
}
function analisarPrecoAtual(cmv, precoAtual, p, precoSugeridoCardapio){
  const cmvPercentual = precoAtual>0? cmv/precoAtual*100 : 0;
  const base = precoSugeridoCardapio!=null? precoSugeridoCardapio : precoAtual;
  const cf = base*(p.percentualCustoFixo/100), cv = base*(p.percentualCustoVariavel/100);
  const lucroValor = precoAtual - cmv - cf - cv;
  const lucroPercentual = precoAtual>0? lucroValor/precoAtual*100 : 0;
  return { cmvPercentual, lucroValor, lucroPercentual, temLucro: lucroValor>0 };
}
function precificar(cmv, p, precoAtual){
  const mk = calcularMarkup(p,false);
  const precoSugeridoCardapio = mk==null? null : cmv*mk;
  const precoSugeridoIfood = precoBaseIfood(precoSugeridoCardapio, p.taxaIfood);
  return { cmv, precoSugeridoCardapio, precoSugeridoIfood,
    analise: (precoAtual&&precoAtual>0)? analisarPrecoAtual(cmv,precoAtual,p,precoSugeridoCardapio) : null };
}
/* Resumo completo de um produto — espelha o bloco "RESUMO PRECIFICAÇÃO" da planilha.
   Tudo calculado como % do preço (atual): lucro% = 100 − CMV% − %custoFixo − %custoVariável. */
function resumoProduto(prod){
  const p = parametrosResolvidos();
  const cmv = cmvProduto(prod);
  const precoAtual = num(prod.precoAtual);
  const mk = calcularMarkup(p,false);
  const sugerido = mk==null? null : cmv*mk;
  const sugeridoIfood = precoBaseIfood(sugerido, p.taxaIfood);
  const pctCF = p.percentualCustoFixo, pctCV = p.percentualCustoVariavel, pctCFCV = pctCF + pctCV;
  const r = { cmv, precoAtual, sugerido, sugeridoIfood, pctCF, pctCV, pctCFCV,
    cmvPct:null, cfcvValor:null, lucroValor:null, lucroPct:null, difSugerido:null };
  if(precoAtual>0){
    r.cmvPct = cmv/precoAtual*100;
    r.cfcvValor = precoAtual*pctCFCV/100;
    r.lucroPct = 100 - r.cmvPct - pctCFCV;
    r.lucroValor = precoAtual*r.lucroPct/100;
    r.difSugerido = sugerido!=null? (precoAtual - sugerido) : null;
  }
  return r;
}

function mesAnteriorYM(ym){ const d=new Date(ym+"-01T00:00:00"); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); }
function metricasMes(ym){
  const ent=obj2arr(STATE.entradas).filter(e=>noMes(e.data,ym)&&daLoja(e));
  const sai=obj2arr(STATE.saidas).filter(s=>noMes(s.data,ym)&&s.status==="confirmado"&&daLoja(s));
  const recBruta=ent.reduce((t,e)=>t+num(e.valor),0);
  const recLiq=ent.reduce((t,e)=>t+num(e.valor)*(1-num(e.taxaPerc)/100),0);
  const desp=sai.reduce((t,s)=>t+num(s.valor),0);
  return {ent,sai,recBruta,recLiq,desp,lucro:recLiq-desp,nVendas:ent.length,ticket:ent.length?recBruta/ent.length:0,margem:recLiq>0?(recLiq-desp)/recLiq*100:0};

function trendChip(a,b,melhorSobe){
  const lbl=fmtMesLabel(mesAnteriorYM(mesRef));

}

function ultimoDiaMes(ym){ const [a,m]=ym.split("-").map(Number); return `${ym}-${String(new Date(a,m,0).getDate()).padStart(2,"0")}`; }
function importarFaturamento(){
  const ym=val("fat_mes"); if(!/^\d{4}-\d{2}$/.test(ym)) return toast("Escolha o mês.");
  const loja=val("fat_loja")||lojaPadrao(); const data=ultimoDiaMes(ym);
  let n=0;
  for(const f of FORMAS){ const v=num(val("fat_"+f.chave)); if(v>0){
    DB.push("caixa/entradas",{data,valor:v,forma:f.chave,taxaPerc:f.taxa,descricao:`Faturamento ${fmtMesLabel(ym)} (importado)`,loja,origem:"importado",criadoEm:Date.now()});
    n++;
  }}
  if(n===0) return toast("Preencha pelo menos uma forma de pagamento.");
  toast(`Faturamento de ${fmtMesLabel(ym)} lançado (${n} forma(s)).`);
}
function mesesEntre(de,ate){ const out=[]; let d=new Date(de+"-01T00:00:00"); const f=new Date((ate||de)+"-01T00:00:00"); let g=0; while(d<=f && g<60){ out.push(d.toISOString().slice(0,7)); d.setMonth(d.getMonth()+1); g++; } return out; }
async function importarHistoricoCW(){
  const url=(val("cwh_url")||"").replace(/\/+$/,""), secret=val("cwh_secret"), loja=val("cwh_loja"), de=val("cwh_de"), ate=val("cwh_ate")||mesAtual();
  if(!url) return toast("Informe a URL da função.");
  if(!de) return toast("Informe o mês inicial.");
  DB.update("config",{funcaoUrl:url,cwSecret:secret});
  const meses=mesesEntre(de,ate); const log=document.getElementById("cwh_log");
  log.innerHTML="Importando "+meses.length+" mês(es)… (pode demorar conforme o volume)";
  for(const mes of meses){
    log.innerHTML+=`<br>${fmtMesLabel(mes)}: buscando…`;
    try{
      const r=await fetch(`${url}?fonte=cw-historico&loja=${encodeURIComponent(loja)}&mes=${mes}&secret=${encodeURIComponent(secret)}`);
      const j=await r.json().catch(()=>({}));
      if(j&&j.ok){ const tot=Object.values(j.porForma||{}).reduce((a,b)=>a+b,0); log.innerHTML+=` ✓ ${j.pedidos||0} pedidos · ${reais(tot)}`; }
      else log.innerHTML+=` — erro: ${esc((j&&j.erro)||("HTTP "+r.status))}`;
    }catch(e){ log.innerHTML+=` — falha de conexão (a função respondeu? CORS?)`; }
  }
  log.innerHTML+="<br><b>Concluído.</b> As entradas aparecem na lista abaixo e no Dashboard.";
  toast("Importação do histórico concluída.");
}

// Dias até o vencimento (negativo = vencida). Base: hoje (meia-noite).
function diasAte(iso){
  if(!iso) return null;
  const hoje=new Date(hojeISO()+"T00:00:00"), v=new Date(iso.slice(0,10)+"T00:00:00");
  return Math.round((v-hoje)/86400000);
}
// Rótulo + cor do vencimento.
function venc(iso){
  const d=diasAte(iso);
  if(d===null) return {txt:"—",cls:"b-gray"};
  if(d<0) return {txt:`vencida há ${-d}d`,cls:"b-red"};
  if(d===0) return {txt:"vence hoje",cls:"b-red"};
  if(d<=7) return {txt:`em ${d}d`,cls:"b-gold"};
  return {txt:`em ${d}d`,cls:"b-gray"};
}

function vendaResumo(){
  const bruto=_vendaItens.reduce((t,i)=>t+num(i.precoUnitario)*num(i.quantidade),0);

  const desconto=descItens+num(val("vd_desconto"));
  const frete=num(val("vd_frete"));
  const taxaCanalValor=canalInfo(val("vd_canal")).taxaPadraoPerc/100*bruto;
  const taxaPagamentoValor=formaTaxa(val("vd_forma"))/100*bruto;
  const cmvTotal=_vendaItens.reduce((t,i)=>t+num(i.cmvUnitarioSnapshot)*num(i.quantidade),0);
  const valorLiquido=bruto+frete-desconto-taxaCanalValor-taxaPagamentoValor;
  return {bruto,desconto,frete,taxaCanalValor,taxaPagamentoValor,cmvTotal,valorLiquido,margem:valorLiquido-cmvTotal};

function receberConta(id){
  const c=STATE.receber[id]; if(!c) return;

  DB.update("receber/"+id,{status:"recebida",recebidoEm:Date.now()});
  if(c.recorrencia==="mensal"){ DB.push("receber",{descricao:c.descricao,valor:num(c.valor),vencimento:proximoMesISO(c.vencimento),forma:c.forma,loja:c.loja||lojaPadrao(),recorrencia:"mensal",status:"aberta",criadoEm:Date.now()}); }

/* ===================== FLUXO DE CAIXA (projeção) ======================== */
function renderFluxo(el){
  document.getElementById("pgSub").textContent = "Saldo atual e projeção dos próximos 30 dias (contas a pagar e a receber).";
  const recLiqTot = obj2arr(STATE.entradas).filter(daLoja).reduce((t,e)=>t+num(e.valor)*(1-num(e.taxaPerc)/100),0);
  const despTot = obj2arr(STATE.saidas).filter(s=>s.status==="confirmado"&&daLoja(s)).reduce((t,s)=>t+num(s.valor),0);
  const saldo = recLiqTot - despTot;
  const limite=30;
  const aPagar = obj2arr(STATE.contas).filter(c=>c.status!=="paga"&&daLoja(c)&&diasAte(c.vencimento)!==null&&diasAte(c.vencimento)<=limite).map(c=>({tipo:"saida",data:c.vencimento,desc:c.descricao,valor:-num(c.valor)}));
  const aReceber = obj2arr(STATE.receber).filter(c=>c.status!=="recebida"&&daLoja(c)&&diasAte(c.vencimento)!==null&&diasAte(c.vencimento)<=limite).map(c=>({tipo:"entrada",data:c.vencimento,desc:c.descricao,valor:num(c.valor)}));
  const mov=[...aReceber,...aPagar].sort((a,b)=>(a.data||"").localeCompare(b.data||""));
  const totReceber=aReceber.reduce((s,m)=>s+m.valor,0), totPagar=aPagar.reduce((s,m)=>s+m.valor,0);
  const projetado=saldo+totReceber+totPagar;
  let acum=saldo;
  el.innerHTML = `
  <div class="grid g4">
    <div class="kpi"><div class="ic b">🏦</div><div><div class="kl">Saldo atual</div><div class="kv">${reais(saldo)}</div><div class="kh">entradas líq. − saídas</div></div></div>
    <div class="kpi"><div class="ic g">📥</div><div><div class="kl">A receber (30d)</div><div class="kv pos">${reais(totReceber)}</div></div></div>
    <div class="kpi"><div class="ic r">📤</div><div><div class="kl">A pagar (30d)</div><div class="kv neg">${reais(Math.abs(totPagar))}</div></div></div>
    <div class="kpi"><div class="ic ${projetado>=0?'g':'r'}">📈</div><div><div class="kl">Saldo projetado</div><div class="kv ${projetado>=0?'pos':'neg'}">${reais(projetado)}</div><div class="kh">em 30 dias</div></div></div>
  </div>
  <div class="card" style="margin-top:14px"><div class="hd"><h3>Movimentos previstos (30 dias)</h3></div><div class="bd">
    ${mov.length? `<table><thead><tr><th>Data</th><th>Descrição</th><th>Tipo</th><th class="r">Valor</th><th class="r">Saldo</th></tr></thead><tbody>${
      mov.map(mm=>{acum+=mm.valor;return `<tr><td>${fmtData(mm.data)}</td><td>${esc(mm.desc||"—")}</td><td>${mm.tipo==="entrada"?'<span class="badge b-green">Entrada</span>':'<span class="badge b-red">Saída</span>'}</td><td class="r ${mm.valor>=0?'pos':'neg'}">${reais(mm.valor)}</td><td class="r"><b>${reais(acum)}</b></td></tr>`;}).join("")
    }</tbody></table>` : `<div class="empty">Sem contas a pagar ou receber nos próximos 30 dias. Cadastre em <a class="linkmais" onclick="irPara('contas')">Contas a pagar</a> ou <a class="linkmais" onclick="irPara('receber')">Contas a receber</a>.</div>`}
  </div></div>`;
}

function renderDRE(el){
  const ym=mesAtual();
  document.getElementById("pgSub").textContent = "Resultado de "+fmtMesLabel(ym);
  const ent=obj2arr(STATE.entradas).filter(e=>noMes(e.data,ym)&&daLoja(e));

  const recLiq=ent.reduce((t,e)=>t+num(e.valor)*(1-num(e.taxaPerc)/100),0);

}

function precAbaImportar(c){
  const ins=Object.keys(STATE.insumos||{}).length, prod=Object.keys(STATE.produtos||{}).length, cst=Object.keys(STATE.custos||{}).length;
  c.innerHTML = `<div class="card"><div class="hd"><h3>Importar planilha "Delivery Lucrativo"</h3><p>Selecione o arquivo .xlsx. Tudo é lido no seu navegador. Ao importar, a precificação atual é substituída pela da planilha.</p></div><div class="bd">
    <input type="file" id="arq" accept=".xlsx,.xls"/>
    <div id="previa" style="margin-top:14px"></div>
  </div></div>
  <div class="card" style="margin-top:14px;border-color:#f3b8b8"><div class="hd"><h3>Apagar dados de precificação</h3><p>Hoje há ${ins} insumo(s), ${prod} produto(s) e ${cst} custo(s). Use isto para limpar uma importação errada e começar do zero. <b>Não afeta o caixa</b> (entradas/saídas).</p></div><div class="bd">
    <button class="btn red" onclick="limparPrecificacao()">Apagar insumos, produtos e custos</button>
  </div></div>`;
  document.getElementById("arq").addEventListener("change", lerExcel);
}
function limparPrecificacao(){
  if(!confirm("Apagar TODOS os dados de precificação (insumos, produtos e custos)?\nAs entradas e saídas do caixa NÃO são afetadas.")) return;
  DB.set("insumos",{}); DB.set("produtos",{}); DB.set("custos",{});
  toast("Dados de precificação apagados. Pode importar de novo.");
  setTimeout(render,200);
}
function lerExcel(ev){
  const file=ev.target.files[0]; if(!file) return;
  const prev=document.getElementById("previa"); prev.innerHTML='<div class="muted">Lendo planilha…</div>';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const mapa={}; wb.SheetNames.forEach(n=>{ mapa[norm(n)]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,raw:true,defval:null}); });
      const r=interpretarPlanilha(n=>mapa[norm(n)]||null);
      if(!r.ok){ prev.innerHTML=`<div class="err">${r.erros.map(esc).join("<br>")}</div>`; return; }
      const d=r.dados;
      prev.innerHTML=`
        ${r.avisos.length?`<div class="warn" style="margin-bottom:10px">${r.avisos.map(esc).join("<br>")}</div>`:""}
        <div class="ok">Planilha lida! Encontrei: <b>${d.insumos.length}</b> insumos, <b>${d.produtos.length}</b> produtos, <b>${d.bebidas.length}</b> bebidas, <b>${d.custos.length}</b> custos.<br>
        Faturamento médio ${reais(d.parametros.faturamentoMedio)} · Lucro ${pct(d.parametros.lucroDesejado)} · Imposto ${pct(d.parametros.taxaImposto)}.</div>
        <button class="btn" style="margin-top:12px" onclick='aplicarImport()'>Importar e substituir precificação</button>`;
      window._importPrevia=d;
    }catch(err){ prev.innerHTML=`<div class="err">Não consegui ler o arquivo (${esc(err.message)}). Envie em .xlsx.</div>`; }
  };
  reader.readAsArrayBuffer(file);
}
function aplicarImport(){
  const d=window._importPrevia; if(!d) return;
  // Insumos extras (que só aparecem na ficha): cria com custo da própria ficha.
  const nomes=new Set(d.insumos.map(i=>norm(i.nome)));
  const extras=[];
  d.produtos.forEach(p=>p.itens.forEach(it=>{ if(!nomes.has(norm(it.insumoNome))){ nomes.add(norm(it.insumoNome)); extras.push({nome:it.insumoNome,quantidadeCompra:1,unidade:"un",valorCompra:it.valorUnit}); } }));
  const insumosObj={}, produtosObj={}, custosObj={};
  [...d.insumos,...extras].forEach((i,k)=>insumosObj["i"+k]={nome:i.nome,quantidadeCompra:i.quantidadeCompra,unidade:i.unidade||"un",valorCompra:i.valorCompra});
  d.produtos.forEach((p,k)=>produtosObj["p"+k]={nome:p.nome,precoAtual:p.precoAtual,cmvManual:(p.cmvManual!=null?p.cmvManual:null),ficha:(p.itens||[]).map(it=>({insumoNome:it.insumoNome,quantidade:it.quantidade,valorUnit:it.valorUnit}))});
  d.custos.forEach((c2,k)=>custosObj["c"+k]={tipo:c2.tipo,categoria:c2.categoria,descricao:c2.descricao,valor:c2.valor});
  DB.set("insumos",insumosObj); DB.set("produtos",produtosObj); DB.set("custos",custosObj);
  DB.set("parametros",Object.assign({},STATE.parametros,{faturamentoMedio:d.parametros.faturamentoMedio,lucroDesejado:d.parametros.lucroDesejado,taxaImposto:d.parametros.taxaImposto,taxaIfood:d.parametros.taxaIfood||(STATE.parametros&&STATE.parametros.taxaIfood)||23}));
  toast("Planilha importada com sucesso!"); abaPrec="precos"; render();
}

/* ====== PARSER DA PLANILHA (portado de importacaoPlanilha.ts do Audens) ==== */
const ABAS_OBRIGATORIAS=["PRODUTOS","CUSTOS FIXOS","CUSTOS VARIAVEIS","DADOS"];
function _toNum(v){ if(v==null||v==="")return NaN; if(typeof v==="number")return v; return Number(String(v).replace(/\s/g,"").replace(",", ".")); }
const _cell=(m,r,c)=>(m[r]&&m[r][c]!=null)?m[r][c]:null;
function _find(m,pred){ for(let r=0;r<m.length;r++){const row=m[r]; if(!row)continue; for(let c=0;c<row.length;c++){ if(pred(norm(row[c])))return{r,c}; }} return null; }
function _findAll(m,pred){ const o=[]; for(let r=0;r<m.length;r++){const row=m[r]; if(!row)continue; for(let c=0;c<row.length;c++){ if(pred(norm(row[c])))o.push({r,c}); }} return o; }
function _parseInsumos(m){
  const pos=_find(m,n=>n==="ITENS"); if(!pos)return[];
  const hr=pos.r, nameCol=pos.c, row=m[hr]||[];
  // Acha as colunas de VALOR e de QUANTIDADE (UNID/GR) pelo cabeçalho — tolera coluna CÓDIGO antes.
  let valorCol=-1, qtyCol=-1;
  for(let c=0;c<row.length;c++){ const h=norm(row[c]);
    if(valorCol<0 && h==="VALOR") valorCol=c;
    if(qtyCol<0 && (h.includes("UNID")||h.includes("GRAMA")||h==="GR"||h.includes("/GR"))) qtyCol=c;
  }
  if(valorCol<0) valorCol=nameCol+3;
  if(qtyCol<0) qtyCol=nameCol+2;
  const out=[];
  for(let r=hr+1;r<m.length;r++){
    const nome=String(_cell(m,r,nameCol)??"").trim();
    if(!nome)continue;
    if(norm(nome)==="TOTAL")break;
    if(/^\d+([.,]\d+)?$/.test(nome.replace(/\s/g,"")))continue; /* nomes só com número = coluna de código */
    const valorCompra=_toNum(_cell(m,r,valorCol));
    if(!Number.isFinite(valorCompra)||valorCompra<=0)continue;
    const q=_toNum(_cell(m,r,qtyCol));
    out.push({nome,unidade:"g",quantidadeCompra:Number.isFinite(q)&&q>0?q:1,valorCompra});
  }
  return out;
}
/* Fichas técnicas: a aba é uma grade de blocos. Cada bloco começa com "Produto|Produto|NOME",
   depois a linha "Código|Item|Valor unit.|Unidade ou Grama|Und. no Produto", e os itens abaixo.
   Devolve um mapa nomeNormalizado -> { nome, itens:[{insumoNome,quantidade,valorUnit}] }. */
function _parseFichaBlocos(m){
  if(!m) return {};
  const mapa={};
  for(let r=0;r<m.length;r++){
    const row=m[r]||[];
    for(let c=0;c<row.length;c++){
      if(norm(_cell(m,r,c))==="PRODUTO" && norm(_cell(m,r,c+1))==="PRODUTO"){
        const nome=String(_cell(m,r,c+2)??"").trim();
        if(!nome) continue;
        const itens=[];
        for(let rr=r+2; rr<Math.min(m.length, r+2+80); rr++){
          const it=String(_cell(m,rr,c+1)??"").trim();
          if(!it) break;
          if(norm(it)==="ITEM") continue;
          const quantidade=_toNum(_cell(m,rr,c+3)); // Unidade ou Grama
          const valorUnit=_toNum(_cell(m,rr,c+2));   // Valor unit. (por grama/unidade)
          if(!Number.isFinite(quantidade)||quantidade<=0) continue;
          itens.push({insumoNome:it, quantidade, valorUnit:Number.isFinite(valorUnit)?valorUnit:0});
        }
        if(itens.length) mapa[norm(nome)]={nome,itens};
      }
    }
  }
  return mapa;
}
/* Produtos a partir da aba RELAÇÃO DE PRODUTOS (tabela limpa: Produto, Valor de Venda, CMV...). */
function _parseProdutosRelacao(m){
  if(!m) return null;
  let hr=-1,nameCol=-1,precoCol=-1,cmvCol=-1;
  for(let r=0;r<Math.min(m.length,15);r++){ const row=m[r]||[]; let nc=-1,pc=-1,cc=-1;
    for(let c=0;c<row.length;c++){ const h=norm(row[c]);
      if(nc<0 && (h==="PRODUTOS"||h==="PRODUTO")) nc=c;
      if(pc<0 && h.includes("VALOR DE VENDA")) pc=c;
      if(cc<0 && h.includes("CMV")) cc=c;
    }
    if(nc>=0 && cc>=0){ hr=r;nameCol=nc;precoCol=pc;cmvCol=cc;break; }
  }
  if(hr<0) return null;
  const out=[];
  for(let r=hr+1;r<m.length;r++){
    const nome=String(_cell(m,r,nameCol)??"").trim();
    if(!nome)continue; if(norm(nome)==="TOTAL")break;
    const cmv=_toNum(_cell(m,r,cmvCol)); if(!Number.isFinite(cmv))continue;
    const preco=precoCol>=0?_toNum(_cell(m,r,precoCol)):NaN;
    out.push({nome,precoAtual:Number.isFinite(preco)&&preco>0?preco:null,cmvManual:cmv,itens:[]});
  }
  return out;
}
function _parseProdutos(m){ const produtos=[]; for(const {r,c} of _findAll(m,n=>n==="PRODUTO")){ const nb=String(_cell(m,r,c+1)??"").trim(); if(!nb)continue; const nome=norm(nb).startsWith("NOME DO SEU PRODUTO")?("Produto "+((nb.match(/\d+/)||[""])[0])).trim():nb; const itens=[]; for(let rr=r+2;rr<Math.min(m.length,r+2+80);rr++){ const insNome=String(_cell(m,rr,c)??"").trim(); const n=norm(insNome); if(!insNome)break; if(n==="ITEM")continue; if(n.startsWith("RESUMO")||n.startsWith("CUSTO DE PRODUTOS"))break; const quantidade=_toNum(_cell(m,rr,c+2)); const valorUnit=_toNum(_cell(m,rr,c+1)); if(!Number.isFinite(quantidade)||quantidade<=0)continue; itens.push({insumoNome:insNome,quantidade,valorUnit:Number.isFinite(valorUnit)?valorUnit:0}); } let precoAtual=null; for(let rr=r+2;rr<Math.min(m.length,r+45);rr++){ for(let cc=c;cc<=c+3;cc++){ if(norm(_cell(m,rr,cc)).includes("PRECO ATUAL DE VENDA")){ const v=_toNum(_cell(m,rr,c+3)); if(Number.isFinite(v)&&v>0)precoAtual=v; } } } if(itens.length>0)produtos.push({nome,precoAtual,itens}); } return produtos; }
function _parseBebidas(m){ const pos=_find(m,n=>n==="ITENS"); if(!pos)return[]; const out=[]; for(let r=pos.r+1;r<m.length;r++){ const nome=String(_cell(m,r,0)??"").trim(); if(!nome)continue; if(norm(nome)==="TOTAL")break; const custo=_toNum(_cell(m,r,1)); if(!Number.isFinite(custo)||custo<=0)continue; const pv=_toNum(_cell(m,r,8)); out.push({nome,custo,precoVenda:Number.isFinite(pv)&&pv>0?pv:null}); } return out; }
const _SEC_FIXAS=[{label:"SALARIOS FREELANCER",nameCol:0,valueCol:4,categoria:"FREELANCER"},{label:"CUSTOS DE FUNCIONAMENTO",nameCol:7,valueCol:8,categoria:"FUNCIONAMENTO"},{label:"LANCHE FUNCIONARIO",nameCol:11,valueCol:12,quantCol:13,categoria:"LANCHE"},{label:"PRO-LABORE",nameCol:11,valueCol:13,categoria:"PRO_LABORE"},{label:"SALARIOS CLT",nameCol:0,valueCol:5,categoria:"CLT"},{label:"CUSTOS GERAIS",nameCol:7,valueCol:8,categoria:"GERAIS"},{label:"MOTOBOYS",nameCol:0,valueCol:4,categoria:"MOTOBOYS"}];
const _SEC_VAR=[{label:"EMPRESTIMOS",nameCol:0,valueCol:1,categoria:"EMPRESTIMOS"},{label:"TAXAS GERAIS",nameCol:3,valueCol:4,categoria:"TAXAS"},{label:"CUSTOS GERAIS",nameCol:6,valueCol:7,categoria:"OUTROS"}];
function _lerSecao(m,s,tipo){ const pos=_find(m,n=>n===s.label); if(!pos)return[]; const out=[]; for(let r=pos.r+1;r<Math.min(m.length,pos.r+40);r++){ const desc=String(_cell(m,r,s.nameCol)??"").trim(); if(norm(desc)==="TOTAL")break; const vu=_toNum(_cell(m,r,s.valueCol)); const valor=s.quantCol!=null?vu*_toNum(_cell(m,r,s.quantCol)):vu; if(desc&&Number.isFinite(valor)&&valor>0)out.push({tipo,categoria:s.categoria,descricao:desc,valor}); } return out; }
function _parseParametros(mD,taxaImposto){
  let fat=0; const mp=_find(mD,n=>n==="MES");
  if(mp){ const vc=mp.c+1; const vals=[]; for(let r=mp.r+1;r<Math.min(mD.length,mp.r+20);r++){ if(norm(_cell(mD,r,mp.c))==="TOTAL")break; const v=_toNum(_cell(mD,r,vc)); if(Number.isFinite(v)&&v>0)vals.push(v); } if(vals.length)fat=vals.reduce((a,b)=>a+b,0)/vals.length; }
  let lucro=0; const lp=_find(mD,n=>n.includes("LUCRO (%)")); if(lp){ const v=_toNum(_cell(mD,lp.r,lp.c+1)); if(Number.isFinite(v))lucro=v; }
  let taxaIfood=23; const tp=_find(mD,n=>n.includes("TAXA IFOOD")); if(tp){ const v=_toNum(_cell(mD,tp.r+1,tp.c+1)); if(Number.isFinite(v)&&v>0)taxaIfood=v; }
  return {faturamentoMedio:fat,lucroDesejado:lucro,taxaImposto,taxaIfood};
}
function _parseImposto(mV){ const pos=_find(mV,n=>n.includes("TAXA DE IMPOSTO")); if(!pos)return 0; const v=_toNum(_cell(mV,pos.r,pos.c+1)); return Number.isFinite(v)?v:0; }
function interpretarPlanilha(getSheet){
  const erros=[],avisos=[];
  const faltando=ABAS_OBRIGATORIAS.filter(a=>!getSheet(a));
  if(faltando.length){ erros.push('A planilha não parece ser a "Delivery Lucrativo": faltam as abas '+faltando.join(", ")+"."); return {ok:false,erros,avisos}; }
  const mProd=getSheet("PRODUTOS"),mFicha=getSheet("FICHA TECNICA"),mBeb=getSheet("BEBIDAS"),mFix=getSheet("CUSTOS FIXOS"),mVar=getSheet("CUSTOS VARIAVEIS"),mDad=getSheet("DADOS");
  const insumos=_parseInsumos(mProd);
  // Produtos: preferimos a aba RELAÇÃO DE PRODUTOS (tabela limpa com CMV pronto); se não houver,
  // caímos no leitor da FICHA TÉCNICA (template antigo).
  const fichas = mFicha ? _parseFichaBlocos(mFicha) : {};
  let produtos=_parseProdutosRelacao(getSheet("RELACAO DE PRODUTOS")) || (mFicha?_parseProdutos(mFicha):[]) || [];
  // Anexa a ficha técnica a cada produto pelo nome (quando houver um bloco correspondente).
  produtos = produtos.map(p=>{ const f=fichas[norm(p.nome)]; return f? Object.assign({},p,{itens:f.itens}) : p; });
  const bebidas=mBeb?_parseBebidas(mBeb):[];
  const custos=[..._SEC_FIXAS.flatMap(s=>_lerSecao(mFix,s,"FIXO")),..._SEC_VAR.flatMap(s=>_lerSecao(mVar,s,"VARIAVEL"))];
  const taxaImposto=_parseImposto(mVar); const parametros=_parseParametros(mDad,taxaImposto);
  const nomesInsumo=new Set(insumos.map(i=>norm(i.nome)));
  const semInsumo=produtos.flatMap(p=>p.itens).filter(i=>!nomesInsumo.has(norm(i.insumoNome))).length;
  if(semInsumo>0)avisos.push(semInsumo+" item(ns) de ficha técnica não tinham insumo na aba PRODUTOS — serão criados a partir do custo da ficha.");
  if(insumos.length===0&&produtos.length===0&&bebidas.length===0){ erros.push("Não encontrei insumos, produtos nem bebidas preenchidos."); return {ok:false,erros,avisos}; }
  return {ok:true,erros,avisos,dados:{insumos,produtos,bebidas,custos,parametros}};
}

// Lê a imagem como dataURL e guarda no Firebase (sem precisar de Storage). Reduz a imagem antes.
// Apaga o fundo branco: faz "flood fill" a partir das BORDAS, removendo só o branco que
// está ao redor (preserva o branco interno, como a faixa do escudo).
function removerFundoBranco(cv){
  const ctx=cv.getContext("2d"), w=cv.width, h=cv.height;
  const id=ctx.getImageData(0,0,w,h), d=id.data, seen=new Uint8Array(w*h), st=[];
  const branco=i=> d[i+3]>0 && d[i]>=235 && d[i+1]>=235 && d[i+2]>=235;
  const push=(x,y)=>{ if(x<0||y<0||x>=w||y>=h) return; const p=y*w+x; if(seen[p]) return; seen[p]=1; st.push(p); };
  for(let x=0;x<w;x++){ push(x,0); push(x,h-1); }
  for(let y=0;y<h;y++){ push(0,y); push(w-1,y); }
  while(st.length){ const p=st.pop(), i=p*4; if(!branco(i)) continue; d[i+3]=0; const x=p%w, y=(p/w)|0; push(x+1,y); push(x-1,y); push(x,y+1); push(x,y-1); }
  ctx.putImageData(id,0,0);
}
function subirLogo(input,alvo){
  const file=input.files&&input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=256, esc2=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement("canvas"); cv.width=Math.round(img.width*esc2); cv.height=Math.round(img.height*esc2);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      const rem=document.getElementById("remFundo"); if(!rem || rem.checked){ try{ removerFundoBranco(cv); }catch(_){} }
      const dataUrl=cv.toDataURL("image/png");
      salvarConfig(alvo==="painel"? {painelLogo:dataUrl} : {lojaPatch:{id:alvo, dados:{logo:dataUrl}}});
      toast("Logo salva.");
    };
    img.onerror=()=>toast("Não consegui ler essa imagem. Tente um PNG ou JPG.");
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removerLogo(alvo){
  salvarConfig(alvo==="painel"? {painelLogo:null} : {lojaPatch:{id:alvo, dados:{logo:null}}});
  toast("Logo removida.");
}
function salvarNomeLoja(id,nome){

// Salva config de forma OTIMISTA (atualiza STATE e a tela na hora) e persiste no Firebase.
function salvarConfig(patch){
  STATE.config = Object.assign({}, STATE.config);
  if("painelLogo" in patch){ STATE.config.painelLogo = patch.painelLogo; DB.update("config",{painelLogo:patch.painelLogo}); }
  if(patch.lojaPatch){
    const lojas = Object.assign({}, STATE.config.lojas||{});
    lojas[patch.lojaPatch.id] = Object.assign({}, lojas[patch.lojaPatch.id]||{}, patch.lojaPatch.dados);
    STATE.config.lojas = lojas; DB.update("config",{lojas});
  }
  aplicarPainelLogo(); render();
}
function salvarFirebase(){
  let txt = val("cfg").trim();
  if(!txt){ return toast("Cole a configuração do Firebase primeiro."); }
  // Aceita tanto JSON puro quanto o trecho que o console do Firebase mostra
  // (ex.: "const firebaseConfig = { apiKey: ... };" — chaves sem aspas).
  let cfg=null;
  try{ cfg = JSON.parse(txt); }catch(_){}
  if(!cfg){
    try{
      const ini = txt.indexOf("{"), fim = txt.lastIndexOf("}");
      if(ini>=0 && fim>ini){ cfg = (new Function("return ("+txt.slice(ini,fim+1)+")"))(); }
    }catch(_){}
  }
  if(!cfg || !cfg.apiKey){ return toast("Não entendi a configuração. Cole o bloco firebaseConfig do console."); }
  if(!cfg.databaseURL){ return toast("Falta o databaseURL — crie o Realtime Database e copie a URL (…firebasedatabase.app)."); }
  localStorage.setItem("fc_firebase_cfg", JSON.stringify(cfg));
  toast("Configuração salva. Conectando…");
  setTimeout(()=>location.reload(),800);
}
function limparFirebase(){ localStorage.removeItem("fc_firebase_cfg"); toast("Modo local. Recarregando…"); setTimeout(()=>location.reload(),600); }

  bind("insumos","insumos");
  bind("produtos","produtos");
  bind("caixa/saidas","saidas");
  bind("caixa/entradas","entradas");
  bind("custos","custos");
  bind("contas","contas");
  bind("receber","receber");
  bind("tarefas","tarefas");
  bind("usuarios","usuarios");
  bind("vendas","vendas");
  bind("canais","canais");
  DB.list("parametros", v=>{ STATE.parametros = v||{}; if(sessaoValida()) render(); });
  DB.list("config", v=>{ STATE.config = v||{}; aplicarPainelLogo(); if(sessaoValida()) render(); });
  if(sessaoValida()) entrarApp(); else mostrarLogin();
}
